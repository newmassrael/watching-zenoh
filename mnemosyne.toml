[workspace]
# README.md and docs/SESSION_KICKOFF.md removed per Round 7 scope correction
# (2026-05-08). README is a 0-byte stub (Phase E prose authoring deferred).
# SESSION_KICKOFF.md moved to notes/SESSION_KICKOFF.md as activity-log genre
# is a fit for ChangelogEntry, not Section. Round 1/5/6 atomic_impact_refs
# pointing at the two doc roots are absorbed by the workspace.docs
# membership change itself — removing the two paths from this list drops
# their cross-refs out of the orphan-eligible set, so no [[orphan_ledger]]
# entry is required. (Earlier draft of this comment referenced a Round 254
# atomic_entry_ref ledger entry "below"; that entry was never authored
# because the membership-level fix made it unnecessary.)
#
# Round 25 Phase E amendment (2026-05-15): README.md re-registered after
# R24 prose authoring + R25 English rewrite (parser-friendly form, no
# markdown URL links, no plain §N inline refs). Korean translation lives
# as README.ko.md satellite file outside workspace.docs governance per
# README language convention. The pre-existing atomic-store section
# `watching-zenoh` (R5 lean/stub form, Round 1/5/6/7 cited) remains as
# the doc-root anchor; atomic decompose of README H2 headings into typed
# Section fields deferred to a later round to keep R25 = register-only
# per CLAUDE.md "one phase per session, do not bundle".
docs = [
    "ARCHITECTURE.md",
    "README.md",
    "docs/intrinsics-runtime-symbols.md",
    "docs/oq-w15-ratification-summary.md",
    "docs/reassembly-fsm.md",
    "docs/rfc-open-questions-log.md",
    "docs/rfc-sce-protocol-synthesis.md",
    "docs/runtime-crate-lwip.md",
    "docs/runtime-crate-tokio.md",
    "docs/scouting-fsm.md",
    "docs/session-fsm.md",
    "docs/wire-spec-subset.md",
]
default_doc = "ARCHITECTURE.md"

[schema]
# rfc-open-questions-log.md uses `## Change log` (with space) for the
# session-by-session update log. Adding it lets the parser skip
# cross_ref extraction inside that section, eliminating the
# §change-log → §X orphan class.
changelog_titles = ["Changelog", "Change History", "Change log"]
# Default `Round ` prefix reserves the `Round N` pattern for future
# formal changelog entries authored via `append_changelog_entry_v2`.
# Existing date-based entries (`- **2026-04-24** — ...`) do not match
# this prefix and remain as prose in the section body.
entry_id_prefix = "Round "

[style]
locale = "en"
# Round 253 EXTERNAL-LEDGER adoption — legacy orphan carry (75 entries).
# Each row registers a known-stale §X.Y reference. Set-equality semantics:
# - new orphan added in source → fails validation until ledgered or fixed
# - entry resolved (ref fixed, target authored) → drift-catch reports it
# Triage is incremental; remove entries as refs resolve.

# Round 7 scope correction — README.md and docs/SESSION_KICKOFF.md
# removed from workspace.docs. Their root atomic sections (the
# `watching-zenoh` root and the legacy SESSION_KICKOFF root, whose
# atomic id is a KO slug locked since R5 — no `rename_section`
# primitive yet) remain in atomic store as historical record (typed-
# populated by Round 5 lean/stub). Round 1/5/6 impact_refs to those
# IDs are NOT dangling because the atomic_id_set retains them —
# atomic store outlives the markdown carrier doc, which is exactly
# the audit-trail genre's intent. No [[orphan_ledger]] entries are
# needed; Round 7 changelog entry alone documents the scope shift.
