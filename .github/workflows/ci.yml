#
# watching-zenoh CI — automated production gate.
#
# Mirrors the local git-hook + verify-codegen.sh + cargo test
# discipline so PRs and main-branch pushes get the same gates that
# every commit on a developer machine already passes (via .githooks/
# pre-commit + commit-msg + pre-push). Three layers run sequentially;
# any one failing fails the workflow.
#
# Layer A — Mnemosyne workspace integrity:
#   mnemosyne-cli validate-workspace must report:
#     T1 orphan total=0, round-trip mandatory=N/N, GENERATED.md=sync.
#   Drift here means a typed-mutate primitive was bypassed (raw Edit
#   on a registered doc, direct sidecar JSON edit, or a frozen-ledger
#   violation). Pre-commit + pre-push hooks already enforce; CI is
#   the cross-developer safety net.
#
# Layer A2 — Envelope mid value= audit (R111 / R117 CI yml sync):
#   scripts/audit-mid-values.sh rejects any sources/codecs/*.scxml
#   whose envelope-level <sce:flag name="mid"> declaration lacks
#   `value=`. R108a precedent: request.scxml had no mid value=
#   from R90 onward, emitting first wire byte 0x40 instead of 0x5C;
#   wz-side round-trip stayed green because the bake was internally
#   consistent, only the Layer 3 wire-compare against zenoh-pico's
#   `_z_request_encode` surfaced the defect at R108b. The audit
#   script is a build-time preventer for that whole class.
#
# Layer B — codegen + Layer 3 wire-interop per codec:
#   For each `sources/codecs/*.scxml` paired with the matching SCE
#   fixture (when one exists), scripts/verify-codegen.sh runs:
#     L1: 6-backend emit-success
#     L2: stem-normalized body-golden vs SCE fixture
#     L3: cargo test wz-integration-tests layer3_<stem> (when present)
#   Each layer's failure exits non-zero.
#
# Layer C — Rust workspace tests + lints:
#   cargo test --workspace + cargo clippy --workspace --all-targets
#   --deny warnings. The clippy gate runs on the entire crate tree
#   including generated code; deny-warnings is the production policy
#   ratified in workspace Cargo.toml `[workspace.lints.rust]`.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # The vendored SCE submodule + zenoh-pico submodule both need fetch.
  # checkout v4's submodule support honors .gitmodules per the
  # `submodules: recursive` flag below.
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: validate + verify + test
    # Ubuntu 22.04 ships gcc 11 + libclang-14 + cmake 3.22 (sufficient
    # for zenoh-pico CMakeLists.txt) + bash 5. Pinning the runner OS
    # version keeps Layer 2 byte-golden output deterministic across
    # SCE codegen invocations.
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # full history for git-log-based commit↔ledger drift check

      - name: Install system dependencies
        # cmake + libclang-dev are needed by zenoh-pico-sys (cmake
        # crate + bindgen). perl is GA on Ubuntu but listed for
        # documentation completeness — used by verify-codegen.sh
        # Layer 2 include-block sort step.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libclang-dev \
            clang \
            perl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          # rust-version pinned to 1.75 in workspace Cargo.toml; the
          # action's `stable` resolves to >=1.75 at runtime, so the
          # workspace's rust-version field gates lower-bound.

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates -> target
            vendor/sce -> target

      - name: Install protoc (mnemosyne-server build-script dep)
        # R64.3 hotfix: cargo install of mnemosyne-cli pulls in the
        # mnemosyne-server workspace member transitively; that crate's
        # build script invokes prost-build which requires the
        # `protoc` binary on PATH. The R64.2 install attempt passed
        # cargo's argument parser but failed at build-script time
        # with `Could not find protoc. ... apt-get install protobuf-compiler`.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install mnemosyne-cli
        # mnemosyne-cli source lives outside this workspace; CI
        # builds it from the upstream main pin used at memory R286
        # (binary 0.1.0 c2b0d077). R64.2 hotfix: `cargo install`
        # does NOT accept `--package` (Cargo's `cargo install
        # --help` lists CRATE as a positional arg). The R64.1
        # attempt used `--package mnemosyne-cli` and was rejected
        # with `error: unexpected argument '--package' found`.
        # Correct shape: pass the crate name positionally + `--bin`
        # disambiguates the binary if the crate ships multiple.
        # The upstream multi-package workspace
        # (audit-broadcast-bench / cascade-measurement /
        # codegen-prototype / mnemosyne-cli / mnemosyne-mcp / etc.)
        # is selected here via the positional crate name.
        run: |
          if ! command -v mnemosyne-cli >/dev/null 2>&1; then
            cargo install --git https://github.com/newmassrael/mnemosyne \
              --branch main --bin mnemosyne-cli mnemosyne-cli || {
              echo "::warning::mnemosyne-cli install failed; Layer A skipped"
              echo "MNEMOSYNE_SKIP=1" >> "$GITHUB_ENV"
            }
          fi

      - name: Build sce-codegen (vendor/sce)
        run: bash scripts/build-sce.sh

      - name: Regenerate docs/GENERATED.md (CI fresh-checkout cascade)
        # R64.4 hotfix: docs/GENERATED.md is .gitignored (byproduct
        # of atomic mutate cascade). Local mutate auto-regenerates
        # it so validate-workspace observes GENERATED.md=sync; CI's
        # fresh checkout has no GENERATED.md (or the wrong one if
        # previously cached), and validate-workspace fails with
        # `GENERATED.md=STALE`. Running generate-docs once here
        # restores the cascade invariant before Layer A.
        if: env.MNEMOSYNE_SKIP != '1'
        run: mnemosyne-cli generate-docs

      # R65b dedupe: every Layer lane below delegates to
      # scripts/run-ci.sh --layer X. The lane bodies (codec map,
      # divergence allowlist, cargo invocations, deploy schema
      # check) live in a single source of truth that both CI and
      # the local pre-push hook (.githooks/pre-push) invoke, so
      # the two paths cannot drift. Previously the CI yaml
      # duplicated ~50 lines of lane logic that pre-push did not
      # mirror; R64.1-R64.4 retrospect made that drift the
      # process-level problem worth solving.

      - name: Layer A — Mnemosyne workspace validate
        if: env.MNEMOSYNE_SKIP != '1'
        run: bash scripts/run-ci.sh --layer A

      - name: Layer A2 — Envelope mid value= audit
        # R117 yml sync — Layer A2 was added to scripts/run-ci.sh in
        # R111 but never paired into the CI yml; this step closes
        # that drift. Layer B's freshness gate (R114) lives INSIDE
        # `--layer B` so CI gets it automatically; only A2 needed a
        # separate yml step because it is a top-level layer.
        run: bash scripts/run-ci.sh --layer A2

      - name: Layer B — verify-codegen.sh per codec
        run: bash scripts/run-ci.sh --layer B

      - name: Layer C0 — binary-dep test #[ignore] discipline
        # R235-hotfix — pre-flight scan: any wz-integration-tests
        # `tests/*.rs` that calls wz_ap_demo_binary() or
        # zenoh_pico_cli_binary( MUST mark every #[test] with an
        # adjacent #[ignore = "..."] so Layer C1 (cargo test
        # --workspace) skips it on fresh CI checkouts where the
        # required binaries are not yet built. Catches the bug
        # class at PR time rather than after Layer C1 panics with
        # "binary not found" downstream.
        run: bash scripts/run-ci.sh --layer C0

      - name: Layer C1 — cargo test --workspace
        run: bash scripts/run-ci.sh --layer C1

      - name: Layer C1b — cargo test -p wz-runtime-core --features alloc
        # R269 — workspace test uses default features so the alloc-
        # gated panic_payload / Error-trait tests in wz-runtime-core
        # would otherwise never run in CI. This lane runs them
        # explicitly; the crate's MCU-target no-default-features
        # build is still validated by Layer C2 (-D warnings).
        run: bash scripts/run-ci.sh --layer C1b

      - name: Layer C1c — cargo test -p wz-session-core --features codec-declare
        # R311ds — same shape as C1b. The workspace test runs the
        # codec-declare-gated wz-session-core declare tests only because
        # wz-runtime-tokio's defaults transitively enable
        # wz-session-core/codec-declare. This lane runs the 58 gated
        # tests (54 R311ds behavioural + 4 R311dm thin) explicitly so
        # coverage cannot silently drop if that transitive enable changes.
        run: bash scripts/run-ci.sh --layer C1c

      - name: Layer C1d — cargo test -p wz-session-core (pub/sub data plane)
        # R311du — same shape as C1c. The migrated pubsub
        # SubscriberRegistry test module gates on the full pub/sub
        # data-plane feature union; the workspace lane runs them only via
        # wz-runtime-tokio's transitive defaults. This lane enumerates
        # the union explicitly so coverage cannot silently drop if those
        # defaults change.
        run: bash scripts/run-ci.sh --layer C1d

      - name: Layer C1e — cargo test -p wz-session-core (query dispatch plane)
        # R311dx — same shape as C1d. The migrated QueryableRegistry test
        # module gates on the query dispatch feature union (query-queryable
        # implies codec-request + codec-response, plus query-attachment /
        # query-selector-parameters / query-reply-err / codec-response-final);
        # the workspace lane runs them only via wz-runtime-tokio's transitive
        # defaults. This lane enumerates the union explicitly so coverage
        # cannot silently drop if those defaults change.
        run: bash scripts/run-ci.sh --layer C1e

      - name: Layer C1f — cargo test -p wz-session-core (reply dispatch plane)
        # R311dy — same shape as C1e. The migrated ReplyRegistry test
        # module gates on the reply dispatch union (codec-response +
        # codec-response-final + pubsub-put + pubsub-delete +
        # query-queryable, plus codec-push for the pubsub dispatch path);
        # the workspace lane runs them only via wz-runtime-tokio's
        # transitive defaults. This lane enumerates the union explicitly
        # so coverage cannot silently drop if those defaults change.
        run: bash scripts/run-ci.sh --layer C1f

      - name: Layer C1g — cargo test -p wz-session-core (observer dispatch plane)
        # R311dz — same shape as C1f. The migrated ApplicationLayerObserver
        # test module gates on the full fan-out union (codec-push +
        # codec-declare + query-queryable + liveliness-token +
        # liveliness-subscriber + declare-subscriber + declare-queryable +
        # codec-response-final + pubsub-put/delete). The lane also adds a
        # composability build of the codec-declare-on / query-queryable-off
        # subset, which composes the observer with the queryable slot
        # elided — the arbitrary-subset class the maximal-preset C1c-f
        # tests never exercise.
        run: bash scripts/run-ci.sh --layer C1g

      - name: Layer C1h — wz-session-core arbitrary-subset composability matrix
        # R311ea — the C1c-g lanes each build wz-session-core under ONE
        # maximal feature union, so a gating regression that only shows in
        # a deliberately-incomplete coherent subset passes CI invisibly.
        # This lane builds the crate under several representative consumer
        # profiles (minimal / pubsub-only / queryable-only / zget-reply /
        # declare-observer / codec-declare-bare); deny-warnings turns every
        # subset-specific unused-import / dead-code into a hard error.
        run: bash scripts/run-ci.sh --layer C1h

      - name: Layer C1i — scouting-active glue unit tests
        # R311ep — scouting-active is off by default, so Layer C1's
        # `cargo test --workspace` never builds the scouting glue. This
        # lane builds + runs the deterministic scouting unit tests
        # (Scout framing / Hello-locator extraction / scout-timeout)
        # under --features scouting-active + deny-warnings. The
        # socket-bound multicast e2e is the opt-in Layer M (multicast
        # routing is environment-dependent; not a default gate).
        run: bash scripts/run-ci.sh --layer C1i

      - name: Layer C2 — cargo clippy --deny warnings
        run: bash scripts/run-ci.sh --layer C2

      - name: Layer C4 — wz facade preset composability matrix
        # R311eb — cargo-builds the wz facade under all 7 named presets
        # (mcu-minimal/-extended, ap-client/-router/-full, zenoh-cpp,
        # cortex-m4-default) so a preset feature-list drift or incoherent
        # combo cannot pass CI invisibly. Facade-level analog of C1h;
        # enforced here (unlike the local-only C3 lint-isolation lane)
        # because it is a composability guard, not a redundant lint pass.
        # no_std footing of the MCU presets stays Layer G's cross-compile.
        run: bash scripts/run-ci.sh --layer C4

      - name: Layer C4b — wz facade arbitrary-incomplete-subset matrix
        # R311ek — cargo-builds the wz facade under deliberately-incomplete
        # coherent consumer subsets (pubsub-only / queryable-only /
        # zget-reply-only / declare-observer). The named-preset C4 lane
        # only covers COMPLETE profiles, and C1h only covers the
        # wz-session-core layer; this lane is the facade-level analog of
        # C1h that locks the runtime-tokio glue's over-broad-gating
        # regression class (observer / liveliness_subscriber / source_info
        # ext encoder) the default-feature CI never exercises.
        run: bash scripts/run-ci.sh --layer C4b

      - name: Install python3-yaml (Layer D dep)
        # Layer D's run-ci.sh path no-ops gracefully when python3-yaml
        # is missing; on CI we install it explicitly so the lane
        # runs the real check rather than the local-developer skip.
        run: sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Layer D — deploy/*.yaml schema validate
        run: bash scripts/run-ci.sh --layer D

      - name: Build zenoh-pico CLI binaries (Layer E dep)
        # R121c yml sync — Layer E spawns target/zenoh-pico-cli/z_put
        # against the wz-ap-demo binary's TCP --listen endpoint. The
        # CLI binaries are built from the vendored zenoh-pico
        # submodule via scripts/build-zenoh-pico-cli.sh; local
        # developers run this on demand, CI builds them every run
        # since the Swatinem cache covers `crates -> target` +
        # `vendor/sce -> target` only.
        run: bash scripts/build-zenoh-pico-cli.sh

      - name: Build wz-ap-demo binary (Layer E dep)
        run: (cd crates && cargo build -p wz-ap-demo)

      - name: Layer E — wz-ap-demo round-trip vs zenoh-pico z_put
        run: bash scripts/run-ci.sh --layer E
