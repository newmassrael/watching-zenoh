#
# watching-zenoh CI — automated production gate.
#
# Mirrors the local git-hook + verify-codegen.sh + cargo test
# discipline so PRs and main-branch pushes get the same gates that
# every commit on a developer machine already passes (via .githooks/
# pre-commit + commit-msg + pre-push). Three layers run sequentially;
# any one failing fails the workflow.
#
# Layer A — Mnemosyne workspace integrity:
#   mnemosyne-cli validate-workspace must report:
#     T1 orphan total=0, round-trip mandatory=N/N, GENERATED.md=sync.
#   Drift here means a typed-mutate primitive was bypassed (raw Edit
#   on a registered doc, direct sidecar JSON edit, or a frozen-ledger
#   violation). Pre-commit + pre-push hooks already enforce; CI is
#   the cross-developer safety net.
#
# Layer B — codegen + Layer 3 wire-interop per codec:
#   For each `sources/codecs/*.scxml` paired with the matching SCE
#   fixture (when one exists), scripts/verify-codegen.sh runs:
#     L1: 6-backend emit-success
#     L2: stem-normalized body-golden vs SCE fixture
#     L3: cargo test wz-integration-tests layer3_<stem> (when present)
#   Each layer's failure exits non-zero.
#
# Layer C — Rust workspace tests + lints:
#   cargo test --workspace + cargo clippy --workspace --all-targets
#   --deny warnings. The clippy gate runs on the entire crate tree
#   including generated code; deny-warnings is the production policy
#   ratified in workspace Cargo.toml `[workspace.lints.rust]`.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # The vendored SCE submodule + zenoh-pico submodule both need fetch.
  # checkout v4's submodule support honors .gitmodules per the
  # `submodules: recursive` flag below.
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: validate + verify + test
    # Ubuntu 22.04 ships gcc 11 + libclang-14 + cmake 3.22 (sufficient
    # for zenoh-pico CMakeLists.txt) + bash 5. Pinning the runner OS
    # version keeps Layer 2 byte-golden output deterministic across
    # SCE codegen invocations.
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # full history for git-log-based commit↔ledger drift check

      - name: Install system dependencies
        # cmake + libclang-dev are needed by zenoh-pico-sys (cmake
        # crate + bindgen). perl is GA on Ubuntu but listed for
        # documentation completeness — used by verify-codegen.sh
        # Layer 2 include-block sort step.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libclang-dev \
            clang \
            perl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          # rust-version pinned to 1.75 in workspace Cargo.toml; the
          # action's `stable` resolves to >=1.75 at runtime, so the
          # workspace's rust-version field gates lower-bound.

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates -> target
            vendor/sce -> target

      - name: Install mnemosyne-cli
        # mnemosyne-cli source lives outside this workspace; CI
        # builds it from the upstream main pin used at memory R286
        # (binary 0.1.0 c2b0d077). The cargo install path here
        # assumes the mnemosyne repo is reachable from the same
        # GitHub org / PAT setup — if it is not yet, fall back to
        # the per-commit pinned tarball.
        run: |
          if ! command -v mnemosyne-cli >/dev/null 2>&1; then
            cargo install --git https://github.com/newmassrael/mnemosyne \
              --branch main --bin mnemosyne-cli || {
              echo "::warning::mnemosyne-cli install failed; Layer A skipped"
              echo "MNEMOSYNE_SKIP=1" >> "$GITHUB_ENV"
            }
          fi

      - name: Build sce-codegen (vendor/sce)
        run: bash scripts/build-sce.sh

      - name: Layer A — Mnemosyne workspace validate
        if: env.MNEMOSYNE_SKIP != '1'
        run: |
          mnemosyne-cli validate-workspace
          echo "Layer A pass"

      - name: Layer B — verify-codegen.sh per codec
        # Iterates every wz codec SCXML and runs L1+L2+L3. When an
        # SCE fixture pair exists (codec_zenoh_<stem> or codec_<stem>
        # variants), pass it as the upstream argument so L2 runs;
        # otherwise L1+L3 only. R44 init_body+join intentionally
        # diverge from SCE fixture (LE endian fix); the workflow
        # tolerates Layer 2 MISMATCH for those two known pairs via
        # the divergence-allowlist below.
        run: |
          set -uo pipefail
          declare -A SCE_UPSTREAM=(
            ["crc16_ccitt"]="vendor/sce/tests/forge/resources/algorithm_crc16.scxml"
            ["keep_alive"]="vendor/sce/tests/forge/resources/codec_zenoh_keep_alive.scxml"
            ["close"]="vendor/sce/tests/forge/resources/codec_variant_session_close.scxml"
            ["frame"]="vendor/sce/tests/forge/resources/codec_zenoh_frame.scxml"
            ["fragment"]="vendor/sce/tests/forge/resources/codec_zenoh_fragment.scxml"
            ["locator"]="vendor/sce/tests/forge/resources/codec_zenoh_locator.scxml"
            ["timestamp"]="vendor/sce/tests/forge/resources/codec_zenoh_timestamp.scxml"
            ["encoding"]="vendor/sce/tests/forge/resources/codec_zenoh_encoding.scxml"
            ["ext_unit"]="vendor/sce/tests/forge/resources/codec_zenoh_ext_unit.scxml"
            ["ext_zint"]="vendor/sce/tests/forge/resources/codec_zenoh_ext_zint.scxml"
            ["ext_zbuf"]="vendor/sce/tests/forge/resources/codec_zenoh_ext_zbuf.scxml"
            ["ext_entry"]="vendor/sce/tests/forge/resources/codec_zenoh_ext_entry.scxml"
            ["scout"]="vendor/sce/tests/forge/resources/codec_zenoh_scout.scxml"
            ["hello"]="vendor/sce/tests/forge/resources/codec_zenoh_hello.scxml"
            ["msg_put"]="vendor/sce/tests/forge/resources/codec_zenoh_msg_put.scxml"
            ["msg_del"]="vendor/sce/tests/forge/resources/codec_zenoh_msg_del.scxml"
            ["wireexpr"]="vendor/sce/tests/forge/resources/codec_zenoh_wireexpr.scxml"
            ["query"]="vendor/sce/tests/forge/resources/codec_zenoh_query.scxml"
            ["request"]="vendor/sce/tests/forge/resources/codec_zenoh_request.scxml"
            ["open_body"]="vendor/sce/tests/forge/resources/codec_zenoh_open_body.scxml"
          )
          # Known Layer 2 divergences (audit-traced in atomic ledger):
          # R44 - init_body + join intentionally use LE (sce:default-endian="little")
          # while SCE fixture still uses BE. Layer 2 reports MISMATCH;
          # this is the CORRECT signal. SCE upstream PR pending.
          LAYER2_KNOWN_DIVERGENCE=(init_body join)

          fail=0
          for scxml in sources/codecs/*.scxml sources/algorithms/*.scxml; do
            stem="$(basename "$scxml" .scxml)"
            upstream="${SCE_UPSTREAM[$stem]:-}"
            extra=()
            [[ -n "$upstream" && -f "$upstream" ]] && extra=("$upstream")

            echo "::group::verify $stem"
            if bash scripts/verify-codegen.sh "$scxml" "${extra[@]}"; then
              echo "  OK"
            else
              # Check if this is a known L2 divergence
              if [[ " ${LAYER2_KNOWN_DIVERGENCE[*]} " == *" $stem "* ]]; then
                echo "::warning::$stem Layer 2 MISMATCH is audit-traced (R44 LE divergence)"
                # Re-run without upstream to verify L1 + L3 alone
                bash scripts/verify-codegen.sh "$scxml" || fail=1
              else
                fail=1
              fi
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Layer C1 — cargo test --workspace
        run: (cd crates && cargo test --workspace)

      - name: Layer C2 — cargo clippy --deny warnings
        run: (cd crates && cargo clippy --workspace --all-targets -- -D warnings)
